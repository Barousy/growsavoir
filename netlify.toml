# ✅ netlify.toml — Runtime Next.js + Prisma bundlé

[build]
  command = "npm run build"
  publish = ".next"

# ⚠️ surtout PAS de redirect /* -> /index.html pour Next.js
#    (c'est pour des SPA statiques, ça casse l'App Router)

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@prisma/client"]
  included_files = [
    "node_modules/.prisma/client/**",
    "prisma/schema.prisma"
  ]

[[plugins]]
  package = "@netlify/plugin-nextjs"
